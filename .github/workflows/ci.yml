name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────
  # 1. Instalar dependências e compilar
  # ──────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🎭 Instalar navegadores do Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: 📤 Salvar cache do Playwright
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ──────────────────────────────────────
  # 2. Executar os testes E2E
  # ──────────────────────────────────────
  test:
    name: 🧪 Test
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔄 Restaurar cache do Playwright
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: 🎭 Instalar navegadores (fallback)
        run: npx playwright install --with-deps chromium firefox webkit

      - name: 🧪 Executar testes E2E (shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }}

      - name: 📤 Upload do blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 7

  # ──────────────────────────────────────
  # 3. Gerar relatório e publicar no GitHub Pages
  # ──────────────────────────────────────
  report:
    name: 📊 Report
    needs: test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 📥 Download de todos os blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: 🔀 Merge dos relatórios
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: 🔧 Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload do artefato para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: 🚀 Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
