name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
  CACHE_KEY: playwright-${{ github.run_id }}

jobs:
  # ──────────────────────────────────────
  # 1. Executar os testes E2E (sharding)
  # ──────────────────────────────────────
  test:
    name: 🧪 Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🎭 Cache de navegadores Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🎭 Instalar navegadores
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: 🔧 Instalar deps de SO (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: 🧪 Executar testes (shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }}

      - name: 📤 Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 3

  # ──────────────────────────────────────
  # 2. Gerar relatório e publicar no GitHub Pages
  # ──────────────────────────────────────
  report:
    name: 📊 Report & Deploy
    needs: test
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: � Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: 🔀 Merge dos relatórios
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: 🔧 Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload artefato para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: 🚀 Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4